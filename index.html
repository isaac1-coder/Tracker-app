<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #00B6FF; --red: #FF4B4B; }
        * { box-sizing: border-box; font-family: 'Avenir Next', sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #eee; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; z-index: 10000; background: var(--snap); display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-box { width: 320px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; }
        .btn-black { width: 100%; padding: 15px; border-radius: 50px; background: black; color: white; border: none; font-weight: 800; cursor: pointer; }

        /* Map */
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; z-index: 1; background: #ccc; }

        /* UI elements */
        .hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .search { background: white; width: 90%; max-width: 400px; padding: 10px 20px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; pointer-events: auto; }
        
        .avatar { width: 50px !important; height: 50px !important; background: var(--snap); border: 4px solid white; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; }
        .nick-label { background: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 900; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Sidebar */
        #sidebar { position: fixed; right: -100%; top: 0; bottom: 0; width: 350px; background: white; z-index: 5000; transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        #sidebar.open { right: 0; }
        .side-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chat-msgs { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 18px; font-size: 14px; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--blue); color: white; }
        .msg.them { align-self: flex-start; background: #f0f0f0; }

        /* Call Overlay */
        #call-overlay { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .btn-call { padding: 15px 40px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 10px; font-size: 16px; }

        .snap-note { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; z-index: 10001; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; }
        .hidden { display: none !important; }
        @media (max-width: 400px) { #sidebar { width: 100%; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-size: 50px">👻</h1>
        <input id="phone" type="tel" placeholder="Phone Number">
        <input id="nick" type="text" placeholder="Nickname">
        <input id="pass" type="password" placeholder="Password">
        <button class="btn-black" onclick="handleAuth()">LOG IN</button>
    </div>
</div>

<div class="hud hidden" id="hud">
    <div class="search">
        <input id="fInput" placeholder="Add phone #" style="border:none; width:100%; outline:none">
        <button onclick="addF()" style="background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer">ADD</button>
    </div>
</div>

<div id="sidebar">
    <div class="side-header">
        <h2 id="side-nick">Name</h2>
        <button onclick="closeSide()" style="border:none; background:none; font-size: 20px;">✕</button>
    </div>
    <div style="padding: 10px; display: flex; gap: 5px;">
        <button onclick="initCall()" style="flex:1; background:var(--blue); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold">CALL</button>
        <button onclick="sendAlert()" style="flex:1; background:var(--red); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold">ALERT</button>
    </div>
    <div id="chat-msgs"></div>
    <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px">
        <input id="cInput" placeholder="Chat..." style="background:#f0f0f0; outline:none" onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:0 15px; border-radius:10px; font-weight:bold">SEND</button>
    </div>
</div>

<div id="call-overlay">
    <h2 id="call-status">INCOMING CALL</h2>
    <h1 id="call-name" style="font-size: 40px; margin: 20px 0;">Friend</h1>
    <div>
        <button class="btn-call" style="background:red; color:white" onclick="endCall()">DECLINE</button>
        <button id="accept-btn" class="btn-call" style="background:white; color:var(--blue)" onclick="acceptCall()">ACCEPT</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myPhone, myNick, markers = {}, curFriendPhone, chatHistory = {};
    const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

    // Restore Cache
    window.onload = () => {
        const cache = JSON.parse(localStorage.getItem('user_prime'));
        if(cache) {
            document.getElementById('phone').value = cache.p;
            document.getElementById('nick').value = cache.n;
            document.getElementById('pass').value = cache.s;
            login(cache.p, cache.n, cache.s);
        }
    };

    function handleAuth() {
        const p = document.getElementById('phone').value;
        const n = document.getElementById('nick').value;
        const s = document.getElementById('pass').value;
        localStorage.setItem('user_prime', JSON.stringify({p, n, s}));
        login(p, n, s);
    }

    function login(phone, nick, pass) {
        myPhone = phone; myNick = nick;
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws`);

        ws.onopen = () => ws.send(JSON.stringify({type:'auth', phone, nick, pass}));
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='auth_success') {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('hud').classList.remove('hidden');
                initMap();
                track();
            }
            if(d.type==='loc_update') updateMarkers(d);
            if(d.type==='chat_msg') {
                const partner = d.fromPhone === myPhone ? curFriendPhone : d.fromPhone;
                if(!chatHistory[partner]) chatHistory[partner] = [];
                chatHistory[partner].push(d);
                if(curFriendPhone === partner) renderChat();
                if(d.fromPhone !== myPhone) showNote(d.fromNick, d.text, d.fromPhone);
            }
            if(d.type==='ring') { alertSnd.play(); showNote("ALERT", d.from + " is ringing you!", ""); }
            if(d.type==='incoming_call') {
                document.getElementById('call-overlay').style.display='flex';
                document.getElementById('call-name').innerText = d.from;
                window.callerId = d.phone;
            }
            if(d.type==='call_connected') {
                document.getElementById('call-status').innerText = "CONNECTED (3:00)";
                document.getElementById('accept-btn').style.display = 'none';
            }
        };
    }

    function initMap() {
        if(map) return;
        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Force map refresh every few seconds to prevent grey screen
        setInterval(() => map.invalidateSize(), 2000);
    }

    function track() {
        navigator.geolocation.watchPosition(p => {
            ws.send(JSON.stringify({type:'location', lat:p.coords.latitude, lng:p.coords.longitude}));
        }, null, {enableHighAccuracy: true});
    }

    function updateMarkers(d) {
        if(d.phone === myPhone) return;
        if(!markers[d.phone]) {
            const icon = L.divIcon({
                className: '',
                html: `<div class="avatar">${d.nick[0]}</div><div class="nick-label">${d.nick}</div>`
            });
            markers[d.phone] = L.marker([d.lat, d.lng], {icon}).addTo(map).on('click', () => openSide(d.phone, d.nick));
        } else {
            markers[d.phone].setLatLng([d.lat, d.lng]);
        }
    }

    function openSide(phone, nick) {
        curFriendPhone = phone;
        document.getElementById('side-nick').innerText = nick;
        document.getElementById('sidebar').classList.add('open');
        renderChat();
    }
    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }

    function renderChat() {
        const box = document.getElementById('chat-msgs');
        box.innerHTML = "";
        (chatHistory[curFriendPhone] || []).forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.fromPhone === myPhone ? 'me' : 'them'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = 99999;
    }

    function sendChat() {
        const i = document.getElementById('cInput');
        if(!i.value) return;
        ws.send(JSON.stringify({type:'chat', target: curFriendPhone, text: i.value}));
        i.value = "";
    }

    function initCall() { ws.send(JSON.stringify({type:'call_request', target: curFriendPhone})); }
    function acceptCall() { ws.send(JSON.stringify({type:'call_accepted', caller: window.callerId})); }
    function endCall() { document.getElementById('call-overlay').style.display='none'; }
    function sendAlert() { ws.send(JSON.stringify({type:'alert', target: curFriendPhone})); }

    function showNote(title, msg, phone) {
        const n = document.createElement('div');
        n.className = 'snap-note';
        n.innerHTML = `<b>${title}</b><br>${msg}`;
        if(phone) n.onclick = () => { openSide(phone, title); n.remove(); };
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    function addF() {
        ws.send(JSON.stringify({type:'add_friend', target: document.getElementById('fInput').value}));
        document.getElementById('fInput').value = "";
    }
</script>
</body>
</html>
