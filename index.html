<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #00B6FF; --red: #FF4B4B; --text: #111; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; }
        body, html { height: 100dvh; width: 100vw; overflow: hidden; position: fixed; background: #000; }
        
        #map { position: absolute; inset: 0; z-index: 0; }

        /* Auth */
        #auth { position: fixed; inset: 0; z-index: 10000; background: var(--snap); display: flex; align-items: center; justify-content: center; text-align: center; }
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-log { width: 100%; padding: 18px; background: #000; color: #fff; border-radius: 50px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* HUD */
        .hud { position: absolute; top: 15px; width: 100%; z-index: 100; display: flex; justify-content: center; pointer-events: none; }
        .search { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 5px 20px; border-radius: 50px; display: flex; pointer-events: auto; width: 90%; max-width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }

        /* Persistent Mobile Sidebar */
        #sidebar { position: fixed; left: 0; bottom: -100%; width: 100%; height: 92%; background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-radius: 25px 25px 0 0; display: flex; flex-direction: column; }
        #sidebar.open { bottom: 0; }
        .side-head { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .side-btns { padding: 12px; display: flex; gap: 10px; background: #fafafa; }
        .s-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; color: white; font-size: 14px; cursor: pointer; }

        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 80%; line-height: 1.4; position: relative; }
        .m.me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .m.them { align-self: flex-start; background: #eee; color: var(--text); border-bottom-left-radius: 2px; }

        /* Call System */
        .call-overlay { position: fixed; inset: 0; background: var(--blue); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .transcript { position: fixed; bottom: 100px; width: 80%; left: 10%; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 12px; z-index: 6000; font-size: 14px; text-align: center; display: none; }

        .avatar { width: 50px; height: 50px; background: var(--snap); border: 3px solid white; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth">
    <div style="width: 320px;">
        <h1 style="font-size:60px; margin-bottom:20px;">👻</h1>
        <input id="ph" type="tel" placeholder="Phone Number" inputmode="tel">
        <input id="ni" type="text" placeholder="Nickname">
        <input id="ps" type="password" placeholder="Password">
        <button onclick="saveAuth()" class="btn-log">LOG IN</button>
    </div>
</div>

<div class="hud hidden" id="hud">
    <div class="search"><input id="fIn" placeholder="Add Friend Phone" style="border:none;outline:none;flex:1;background:transparent;padding:12px;font-size:16px;"><button onclick="addFriend()" style="border:none;background:none;color:var(--blue);font-weight:bold;padding-right:10px;">ADD</button></div>
</div>

<div id="sidebar">
    <div class="side-head">
        <h2 id="sNick">Friend</h2><button onclick="closeSide()" style="border:none;background:none;font-size:30px;padding:10px;">✕</button>
    </div>
    <div class="side-btns">
        <button onclick="call()" class="s-btn" style="background:var(--blue)">VOICE CALL</button>
        <button onclick="ws.send(JSON.stringify({type:'alert',target:curFriend}))" class="s-btn" style="background:var(--red)">ALERT</button>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px; padding-bottom: 30px;">
        <input id="cIn" onkeydown="if(event.key==='Enter') sendChat()" placeholder="Type a message..." style="flex:1; background:#f2f2f2; border-radius:15px; padding:15px; font-size:16px;">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:0 20px; border-radius:15px; font-weight:bold;">SEND</button>
    </div>
</div>

<div class="call-overlay" id="callUi">
    <h2>LIVE CALL</h2><h1 id="callNick" style="font-size: 50px; margin: 20px 0;">...</h1>
    <button onclick="location.reload()" style="background:white; color:red; padding:18px 50px; border-radius:50px; border:none; font-weight:bold; font-size:18px;">END CALL</button>
</div>

<div class="transcript" id="transBox">Listening...</div>
<div id="map"></div>
<audio id="rAudio" autoplay playsinline></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myP, markers = {}, curFriend, pc, chatCache = {};
    const fKey = "snap_friends_v4", aKey = "snap_auth_v4";

    window.onload = () => {
        const auth = JSON.parse(localStorage.getItem(aKey));
        if(auth) { document.getElementById('ph').value=auth.p; document.getElementById('ni').value=auth.n; document.getElementById('ps').value=auth.s; doAuth(auth.p, auth.n, auth.s); }
    };

    function saveAuth() {
        const p=document.getElementById('ph').value, n=document.getElementById('ni').value, s=document.getElementById('ps').value;
        localStorage.setItem(aKey, JSON.stringify({p,n,s})); doAuth(p,n,s);
    }

    function doAuth(p, n, s) {
        myP = p; const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, pass:s}));
            JSON.parse(localStorage.getItem(fKey) || "[]").forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='auth_ok') { document.getElementById('auth').style.display='none'; document.getElementById('hud').classList.remove('hidden'); initMap(); track(); }
            if(d.type==='loc') updateMap(d);
            if(d.type==='chat') { 
                const room = d.from === myP ? d.target : d.from;
                if(!chatCache[room]) chatCache[room] = [];
                chatCache[room].push(d);
                if(curFriend === room) renderChat();
            }
            if(d.type==='ring_alert') new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3').play();
            if(d.type==='call_signal') handleSignal(d);
        };
    }

    function initMap() {
        map = L.map('map', {zoomControl: false, tap: false}).setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setInterval(() => map.invalidateSize(), 1000);
    }

    function track() {
        navigator.geolocation.watchPosition(pos => {
            if(ws.readyState===1) ws.send(JSON.stringify({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude}));
        }, null, {enableHighAccuracy:true});
    }

    function updateMap(d) {
        if(d.p === myP) return;
        if(!markers[d.p]) {
            const icon = L.divIcon({className:'', iconSize: [50,50], html:`<div class="avatar">${d.n[0]}</div>`});
            markers[d.p] = L.marker([d.lat, d.lng], {icon}).addTo(map).on('click', () => {
                curFriend = d.p; document.getElementById('sNick').innerText = d.n; 
                document.getElementById('sidebar').classList.add('open'); renderChat();
            });
        } else markers[d.p].setLatLng([d.lat, d.lng]);
    }

    function addFriend() {
        const v = document.getElementById('fIn').value;
        const list = JSON.parse(localStorage.getItem(fKey) || "[]");
        if(!list.includes(v)) { list.push(v); localStorage.setItem(fKey, JSON.stringify(list)); }
        ws.send(JSON.stringify({type:'add_friend', target:v}));
        document.getElementById('fIn').value = "";
    }

    async function call() {
        document.getElementById('callUi').style.display='flex';
        document.getElementById('callNick').innerText = document.getElementById('sNick').innerText;
        await startPC(curFriend);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type:'call_signal', target:curFriend, sdp:offer}));
    }

    async function handleSignal(d) {
        if(!pc) { 
            document.getElementById('callUi').style.display='flex'; 
            document.getElementById('callNick').innerText = d.fromNick;
            await startPC(d.from); 
        }
        if(d.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
            if(d.sdp.type==='offer') {
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                ws.send(JSON.stringify({type:'call_signal', target:d.from, sdp:ans}));
            }
        } else if(d.candidate) await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
    }

    async function startPC(target) {
        pc = new RTCPeerConnection({iceServers: [{urls:'stun:stun.l.google.com:19302'}]});
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({type:'call_signal', target, candidate:e.candidate}));
        pc.ontrack = e => { document.getElementById('rAudio').srcObject = e.streams[0]; };
        
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = true; rec.interimResults = true;
        rec.onresult = e => { 
            const t = e.results[e.results.length-1][0].transcript;
            document.getElementById('transBox').style.display='block'; document.getElementById('transBox').innerText = t;
        };
        rec.start();
    }

    function sendChat() {
        const i = document.getElementById('cIn');
        if(!i.value) return;
        ws.send(JSON.stringify({type:'chat', target:curFriend, text:i.value}));
        i.value = "";
    }

    function renderChat() {
        const b = document.getElementById('msgs'); b.innerHTML = "";
        (chatCache[curFriend] || []).forEach(d => {
            const div = document.createElement('div');
            div.className = `m ${d.from === myP ? 'me' : 'them'}`;
            div.innerText = d.text; b.appendChild(div);
        });
        b.scrollTop = b.scrollHeight;
    }

    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }
</script>
</body>
</html>
