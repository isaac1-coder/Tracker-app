<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tracker Pro Professional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --snap: #FFFC00; --blue: #0084FF; --red: #FF3B30; --dark: #121212; --glass: rgba(30, 30, 30, 0.9);
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; width: 100vw; margin: 0; background: #000; overflow: hidden; position: fixed; }
        
        #map { position: absolute; inset: 0; z-index: 1; background: #111; }

        /* AUTH MODULE */
        #auth-gate {
            position: fixed; inset: 0; z-index: 10000; background: var(--snap);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .auth-card { width: 85%; max-width: 400px; text-align: center; }
        .auth-card h1 { font-size: 72px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 20px; margin: 10px 0; border-radius: 18px; border: none; 
            font-size: 18px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .primary-btn { 
            width: 100%; padding: 20px; background: #000; color: #fff; 
            border-radius: 50px; border: none; font-weight: 800; font-size: 18px; margin-top: 15px; 
        }

        /* NAVIGATION & HUD */
        .hud-top {
            position: absolute; top: 20px; width: 100%; z-index: 1000;
            display: flex; justify-content: center; pointer-events: none;
        }
        .search-tray {
            background: var(--glass); backdrop-filter: blur(25px); padding: 5px 20px;
            border-radius: 50px; display: flex; align-items: center; width: 90%;
            max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-tray input { background: transparent; color: white; box-shadow: none; font-size: 15px; flex: 1; }

        /* SIDEBAR CHAT */
        #chat-sidebar {
            position: fixed; left: 0; bottom: -100%; width: 100%; height: 95dvh;
            background: #181818; z-index: 5000; border-radius: 35px 35px 0 0;
            display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            color: #fff; box-shadow: 0 -15px 50px rgba(0,0,0,0.6);
        }
        #chat-sidebar.open { bottom: 0; }
        .chat-header { padding: 25px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-actions { display: flex; gap: 12px; padding: 15px 25px; background: #222; }
        .action-btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 800; color: #fff; cursor: pointer; }

        #msg-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 14px 20px; border-radius: 22px; font-size: 16px; max-width: 80%; line-height: 1.5; background: #333; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--blue); }
        .bubble .quote { font-size: 12px; opacity: 0.5; border-left: 2px solid #fff; padding-left: 8px; margin-bottom: 5px; display: block; }

        /* NOTIFICATIONS */
        #notif-hub { position: fixed; bottom: 30px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: #fff; color: #000; padding: 15px 25px; border-radius: 50px;
            font-weight: 800; box-shadow: 0 10px 40px rgba(0,0,0,0.4); pointer-events: auto;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
            border-left: 8px solid var(--blue);
        }
        @keyframes popIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* VOIP UI */
        #voip-screen {
            position: fixed; inset: 0; background: var(--blue); z-index: 9000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .voip-nick { font-size: 52px; font-weight: 900; margin: 30px 0; color: #fff; }
        .transcription { margin-top: 40px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; width: 80%; text-align: center; }

        /* MARKERS */
        .snap-pin {
            width: 55px !important; height: 55px !important;
            background: var(--snap); border: 5px solid #fff; border-radius: 50% !important;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.4); font-size: 22px; color: #000;
        }
        .pin-tag { background: #fff; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 900; margin-top: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-card">
        <h1>👻</h1>
        <input id="in-phone" type="tel" placeholder="Phone Number" inputmode="tel">
        <input id="in-nick" type="text" placeholder="Nickname">
        <input id="in-pass" type="password" placeholder="Password">
        <button class="primary-btn" onclick="initAuth()">LOGIN / SIGNUP</button>
    </div>
</div>

<div class="hud-top hidden" id="ui-hud">
    <div class="search-tray">
        <input id="find-phone" placeholder="Follow Phone #">
        <button onclick="addContact()" style="background:none; border:none; color:var(--blue); font-weight:900; cursor:pointer">SYNC</button>
    </div>
</div>

<div id="chat-sidebar">
    <div class="chat-header">
        <h2 id="active-nick">Name</h2>
        <button onclick="closeChat()" style="background:none; border:none; color:#fff; font-size:32px">✕</button>
    </div>
    <div class="chat-actions">
        <button onclick="startCall()" class="action-btn" style="background:var(--blue)">CALL</button>
        <button onclick="sendAlert()" class="action-btn" style="background:var(--red)">ALERT</button>
    </div>
    <div id="msg-feed"></div>
    <div id="reply-indicator" class="hidden" style="background:#222; padding:12px; font-size:12px">Replying... <button onclick="cancelReply()" style="color:red">Cancel</button></div>
    <div style="padding:15px; display:flex; gap:10px; padding-bottom: 45px">
        <input id="msg-input" onkeydown="if(event.key==='Enter') sendMsg()" placeholder="Send a chat..." style="flex:1; background:#252525; color:#fff; border-radius:18px">
        <button onclick="sendMsg()" style="background:var(--snap); border:none; padding:0 25px; border-radius:18px; font-weight:900">SEND</button>
    </div>
</div>

<div id="voip-screen">
    <h2 id="voip-status" style="color:#fff">INCOMING CALL</h2>
    <h1 id="voip-target" class="voip-nick">User</h1>
    <div style="display:flex; gap:25px">
        <button onclick="handleCall(false)" style="background:var(--red); color:#fff; padding:20px 45px; border-radius:50px; border:none; font-weight:900">HANGUP</button>
        <button id="acc-btn" onclick="handleCall(true)" style="background:#fff; color:var(--blue); padding:20px 45px; border-radius:50px; border:none; font-weight:900">ACCEPT</button>
    </div>
    <div id="stt-box" class="transcription">...</div>
</div>

<div id="notif-hub"></div>
<div id="map"></div>
<audio id="audio-bridge" autoplay playsinline></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- PERSISTENCE & STATE ---
    let socket, map, myPh, myNi, pins = {}, activeFriend, history = [], replyId = null;
    const ring = new Audio('https://assets.mixkit.co/active_storage/sfx/1350/1350-preview.mp3'); ring.loop = true;
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

    window.onload = () => {
        const cache = JSON.parse(localStorage.getItem('tracker_pro_v8'));
        if (cache) {
            document.getElementById('in-phone').value = cache.p;
            document.getElementById('in-nick').value = cache.n;
            document.getElementById('in-pass').value = cache.s;
            initAuth();
        }
    };

    function initAuth() {
        const p = document.getElementById('in-phone').value, n = document.getElementById('in-nick').value, s = document.getElementById('in-pass').value;
        if (!p || !n || !s) return;
        myPh = p; myNi = n;
        localStorage.setItem('tracker_pro_v8', JSON.stringify({p, n, s}));
        
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        socket = new WebSocket(`${proto}://${location.host}/ws`);
        socket.binaryType = "arraybuffer";

        socket.onopen = () => {
            socket.send(JSON.stringify({type:'auth', phone:p, nick:n, text:s}));
            const flist = JSON.parse(localStorage.getItem('tracker_pro_friends') || "[]");
            flist.forEach(f => socket.send(JSON.stringify({type:'add_friend', target:f})));
        };

        socket.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) { playBinaryAudio(e.data); return; }
            const d = JSON.parse(e.data);
            handleInbound(d);
        };
    }

    // --- MAP ENGINE ---
    function setupMap() {
        if (map) return;
        map = L.map('map', { zoomControl: false, tap: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager_all/{z}/{x}/{y}{r}.png').addTo(map);
        setInterval(() => map.invalidateSize(), 1500);
    }

    function handleInbound(d) {
        switch(d.type) {
            case 'auth_ok':
                document.getElementById('auth-gate').style.transform = 'translateY(-100%)';
                document.getElementById('ui-hud').classList.remove('hidden');
                setupMap();
                trackUser();
                break;
            case 'loc':
                renderMarker(d);
                break;
            case 'chat':
                history.push(d);
                const room = d.from === myPh ? d.target : d.from;
                if (activeFriend === room) drawChat();
                if (d.from !== myPh && !document.getElementById('chat-sidebar').classList.contains('open')) {
                    toast(d.fromNick, d.text, d.from);
                }
                break;
            case 'react':
                const m = history.find(x => x.msgId === d.msgId);
                if (m) { m.reaction = "👍"; drawChat(); }
                break;
            case 'ring_alert':
                beep.play();
                toast("ALERT", `${d.from} is ringing you!`, "");
                break;
            case 'call_invite':
                triggerCallUI(d.from, d.fromNick);
                break;
            case 'call_response':
                if (d.accept) launchVOIP();
                else { alert("Call declined"); endVOIP(); }
                break;
            case 'transcription':
                document.getElementById('stt-box').innerText = d.text;
                break;
            case 'note':
                toast("SYSTEM", d.msg, "");
                break;
        }
    }

    function renderMarker(d) {
        if (d.phone === myPh) return;
        const pos = [d.lat, d.lng];
        if (!pins[d.phone]) {
            const icon = L.divIcon({
                className: '', iconSize: [55, 75],
                html: `<div class="snap-pin">${d.nick[0]}</div><div class="pin-tag">${d.nick}</div>`
            });
            pins[d.phone] = L.marker(pos, {icon}).addTo(map).on('click', () => openChat(d.phone, d.nick));
        } else {
            pins[d.phone].setLatLng(pos);
        }
    }

    function openChat(phone, nick) {
        activeFriend = phone;
        document.getElementById('active-nick').innerText = nick;
        document.getElementById('chat-sidebar').classList.add('open');
        drawChat();
    }

    function closeChat() { document.getElementById('chat-sidebar').classList.remove('open'); activeFriend = null; }

    function drawChat() {
        const box = document.getElementById('msg-feed');
        box.innerHTML = "";
        history.filter(m => (m.from === myPh && m.target === activeFriend) || (m.from === activeFriend && m.target === myPh)).forEach(m => {
            const div = document.createElement('div');
            div.className = `bubble ${m.from === myPh ? 'me' : 'them'}`;
            let html = "";
            if (m.replyTo) {
                const r = history.find(x => x.msgId === m.replyTo);
                if (r) html += `<span class="quote">${r.text.substring(0,25)}...</span>`;
            }
            html += m.text;
            if (m.reaction) html += `<span class="reaction">👍</span>`;
            div.innerHTML = html;
            div.onclick = () => { replyId = m.msgId; document.getElementById('reply-indicator').classList.remove('hidden'); };
            div.oncontextmenu = (e) => { e.preventDefault(); socket.send(JSON.stringify({type:'react', target: activeFriend, msgId: m.msgId})); };
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if (!i.value) return;
        socket.send(JSON.stringify({
            type: 'chat', target: activeFriend, text: i.value, msgId: Date.now().toString(), replyTo: replyId
        }));
        i.value = ""; cancelReply();
    }

    // --- VOIP PIPELINE (1-SEC CHUNKS) ---
    function startCall() {
        socket.send(JSON.stringify({type:'call_invite', target: activeFriend}));
        document.getElementById('voip-status').innerText = "CALLING...";
        document.getElementById('voip-target').innerText = document.getElementById('active-nick').innerText;
        document.getElementById('voip-screen').style.display = 'flex';
        document.getElementById('acc-btn').classList.add('hidden');
    }

    function triggerCallUI(ph, ni) {
        window.incoming = ph;
        document.getElementById('voip-status').innerText = "INCOMING...";
        document.getElementById('voip-target').innerText = ni;
        document.getElementById('voip-screen').style.display = 'flex';
        document.getElementById('acc-btn').classList.remove('hidden');
        ring.play();
    }

    function handleCall(acc) {
        ring.pause();
        socket.send(JSON.stringify({type:'call_response', target: window.incoming || activeFriend, accept: acc}));
        if (acc) launchVOIP(); else endVOIP();
    }

    async function launchVOIP() {
        document.getElementById('voip-status').innerText = "LIVE (3:00)";
        document.getElementById('acc-btn').classList.add('hidden');
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        const rec = new MediaRecorder(stream);
        rec.ondataavailable = e => { if (e.data.size > 0 && socket.readyState === 1) socket.send(e.data); };
        rec.start(1000); // 1-Second RAM Buffer
        
        const STT = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (STT) {
            const s = new STT(); s.continuous = true; s.interimResults = true;
            s.onresult = ev => {
                const t = ev.results[ev.results.length-1][0].transcript;
                socket.send(JSON.stringify({type:'transcription', target: window.incoming || activeFriend, text: t}));
            };
            s.start();
        }
    }

    function playBinaryAudio(buf) {
        const blob = new Blob([buf], { type: 'audio/webm' });
        new Audio(URL.createObjectURL(blob)).play();
    }

    // --- HELPERS ---
    function trackUser() {
        navigator.geolocation.watchPosition(p => {
            if (socket.readyState === 1) socket.send(JSON.stringify({type:'location', lat:p.coords.latitude, lng:p.coords.longitude}));
        }, null, {enableHighAccuracy: true});
    }

    function toast(t, m, p) {
        const hub = document.getElementById('notif-hub');
        const d = document.createElement('div');
        d.className = 'toast';
        d.innerHTML = `<strong>${t}</strong><br>${m}`;
        d.onclick = () => { if(p) openChat(p, t); d.remove(); };
        hub.appendChild(d);
        setTimeout(() => d.remove(), 6000);
    }

    function addContact() {
        const v = document.getElementById('find-phone').value;
        if (!v) return;
        const l = JSON.parse(localStorage.getItem('tracker_pro_friends') || "[]");
        if (!l.includes(v)) { l.push(v); localStorage.setItem('tracker_pro_friends', JSON.stringify(l)); }
        socket.send(JSON.stringify({type:'add_friend', target: v}));
        document.getElementById('find-phone').value = "";
    }

    function cancelReply() { replyId = null; document.getElementById('reply-indicator').classList.add('hidden'); }
    function endVOIP() { document.getElementById('voip-screen').style.display = 'none'; }
    function sendAlert() { socket.send(JSON.stringify({type:'alert', target: activeFriend})); }
</script>
</body>
</html>
