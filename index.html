<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zenith Elite Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.2.js"></script>
    <style>
        :root { --snap: #FFFC00; --accent: #00E5FF; --danger: #FF3B30; --dark: #0A0A0A; --glass: rgba(20, 20, 20, 0.85); }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body, html { height: 100dvh; width: 100vw; margin: 0; background: #000; overflow: hidden; position: fixed; color: white; }

        /* THE MAP - HIGH STABILITY */
        #map { position: absolute; inset: 0; z-index: 1; background: #111; }

        /* AUTH SCREEN */
        #auth-gate { position: fixed; inset: 0; z-index: 10000; background: var(--snap); display: flex; align-items: center; justify-content: center; transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1); }
        .auth-card { width: 85%; max-width: 380px; text-align: center; color: black; }
        .auth-card h1 { font-size: 80px; margin-bottom: 20px; }
        input { width: 100%; padding: 20px; margin: 10px 0; border-radius: 20px; border: none; font-size: 16px; font-weight: 600; outline: none; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-main { width: 100%; padding: 20px; background: black; color: white; border-radius: 50px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 15px; }

        /* HUD */
        .hud { position: absolute; top: 20px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        .search-container { background: var(--glass); backdrop-filter: blur(20px); padding: 5px 20px; border-radius: 50px; display: flex; align-items: center; width: 90%; max-width: 500px; box-shadow: 0 15px 45px rgba(0,0,0,0.5); pointer-events: auto; border: 1px solid rgba(255,255,255,0.1); }
        .search-container input { background: transparent; color: white; border: none; flex: 1; padding: 12px; font-weight: 500; outline: none; }

        /* SIDEBAR CHAT - SNAPCHAT STYLE */
        #sidebar { position: fixed; right: -100%; top: 0; bottom: 0; width: 400px; background: #0F0F0F; z-index: 5000; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.8); }
        #sidebar.open { right: 0; }
        .side-head { padding: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .side-tools { display: flex; gap: 10px; padding: 15px 25px; background: #151515; }
        .tool-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 900; color: white; cursor: pointer; font-size: 11px; letter-spacing: 1px; }

        #msg-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 14px 20px; border-radius: 24px; font-size: 15px; max-width: 85%; line-height: 1.5; background: #222; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--accent); color: black; font-weight: 600; border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: #333; color: white; border-bottom-left-radius: 4px; }
        .reply-hint { font-size: 11px; opacity: 0.5; margin-bottom: 4px; display: block; border-left: 2px solid white; padding-left: 8px; }

        /* AGORA CALL UI */
        #call-screen { position: fixed; inset: 0; background: #007AFF; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .call-nick { font-size: 50px; font-weight: 900; margin: 30px 0; }
        .call-actions { display: flex; gap: 20px; }
        .c-btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* NOTIFICATIONS */
        #notif-hub { position: fixed; bottom: 30px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; align-items: flex-end; }
        .toast { background: white; color: black; padding: 18px 28px; border-radius: 20px; font-weight: 800; box-shadow: 0 10px 40px rgba(0,0,0,0.4); pointer-events: auto; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 6px solid var(--accent); cursor: pointer; }
        @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }

        /* MARKERS */
        .avatar-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-dot { width: 10px; height: 10px; background: var(--accent); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        .pin-name { background: white; color: black; padding: 4px 12px; border-radius: 50px; font-weight: 900; font-size: 11px; margin-bottom: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media (max-width: 450px) { #sidebar { width: 100%; } }
        .hidden { display: none !important; }
        .alert-active { animation: flash 0.3s infinite; }
        @keyframes flash { 0% { background: #000; } 50% { background: #400; } 100% { background: #000; } }
    </style>
</head>
<body id="app-body">

<div id="auth-gate">
    <div class="auth-card">
        <h1>👻</h1>
        <input id="au-ph" type="tel" placeholder="Phone Number">
        <input id="au-ni" type="text" placeholder="Nickname">
        <input id="au-ps" type="password" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">CONTINUE</button>
    </div>
</div>

<div class="hud hidden" id="ui-hud">
    <div class="search-container">
        <input id="f-inp" placeholder="Phone # to Track">
        <button onclick="addFriend()" style="background:none; border:none; color:var(--accent); font-weight:900; cursor:pointer">SYNC</button>
    </div>
</div>

<div id="sidebar">
    <div class="side-head">
        <h2 id="s-nick">User</h2>
        <button onclick="closeSide()" style="background:none; border:none; color:white; font-size:35px">✕</button>
    </div>
    <div class="side-tools">
        <button onclick="initiateAgoraCall()" class="tool-btn" style="background:var(--accent); color:black">VOICE CALL</button>
        <button onclick="sendAlert()" class="tool-btn" style="background:var(--danger)">ALERT</button>
    </div>
    <div id="msg-feed"></div>
    <div id="reply-box" class="hidden" style="padding:15px; background:#111; font-size:12px; border-top:1px solid #222">Replying... <button onclick="cancelReply()" style="color:red">Cancel</button></div>
    <div style="padding:20px; display:flex; gap:12px; border-top:1px solid #222; padding-bottom: 50px">
        <input id="m-inp" onkeydown="if(event.key==='Enter') sendChat()" placeholder="Chat..." style="flex:1; background:#1a1a1a; color:white; border-radius:18px; padding:18px; border:none">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:0 25px; border-radius:18px; font-weight:900; color:black">SEND</button>
    </div>
</div>

<div id="call-screen">
    <h2>VOICE SESSION</h2>
    <h1 id="v-nick" class="call-nick">Friend</h1>
    <div class="call-actions">
        <button class="c-btn" style="background:white; color:red" onclick="endAgoraCall()">END</button>
        <button id="v-acc" class="c-btn" style="background:white; color:var(--blue)" onclick="acceptAgoraCall()">ACCEPT</button>
    </div>
</div>

<div id="notif-hub"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myPh, myNi, markers = {}, curF, chatCache = {}, replyId = null;
    let agoraClient, localAudioTrack;
    const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
    const ringSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1350/1350-preview.mp3'); ringSnd.loop = true;

    // PERSISTENCE: Restore Chats and Session
    window.onload = () => {
        chatCache = JSON.parse(localStorage.getItem('zenith_chat_v14') || "{}");
        const auth = JSON.parse(localStorage.getItem('zenith_auth_v14'));
        if (auth) {
            document.getElementById('au-ph').value = auth.p;
            document.getElementById('au-ni').value = auth.n;
            document.getElementById('au-ps').value = auth.s;
            handleAuth();
        }
    };

    function handleAuth() {
        const p = document.getElementById('au-ph').value, n = document.getElementById('au-ni').value, s = document.getElementById('au-ps').value;
        if (!p || !n || !s) return;
        myPh = p; myNi = n;
        localStorage.setItem('zenith_auth_v14', JSON.stringify({p, n, s}));
        
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, pass:s}));
            JSON.parse(localStorage.getItem('zenith_friends_v14') || "[]").forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };
        ws.onmessage = (e) => handleData(JSON.parse(e.data));
    }

    function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: false, tap: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setInterval(() => map.invalidateSize(), 1500); // 100% Guaranteed visible
    }

    function handleData(d) {
        switch(d.type) {
            case 'auth_ok':
                document.getElementById('auth-gate').style.transform = 'translateY(-100%)';
                document.getElementById('ui-hud').classList.remove('hidden');
                initMap(); track(); break;
            case 'loc': updateMarker(d); break;
            case 'chat':
                const room = d.from === myPh ? d.target : d.from;
                if (!chatCache[room]) chatCache[room] = [];
                chatCache[room].push(d);
                localStorage.setItem('zenith_chat_v14', JSON.stringify(chatCache));
                if (curF === room) renderChat();
                if (d.from !== myPh && !document.getElementById('sidebar').classList.contains('open')) {
                    toast(d.fromNick, d.text, d.from, d.fromNick);
                }
                break;
            case 'alert': 
                alertSnd.play(); 
                document.getElementById('app-body').classList.add('alert-active');
                setTimeout(() => document.getElementById('app-body').classList.remove('alert-active'), 3000);
                toast("EMERGENCY", d.fromNick + " is Alerting You!", ""); break;
            case 'call_invite':
                window.channel = d.channel; window.caller = d.from;
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('v-nick').innerText = d.fromNick;
                ringSnd.play(); break;
            case 'call_resp':
                if (d.accept) joinAgoraChannel(d.channel); else endAgoraCall(); break;
        }
    }

    function updateMarker(d) {
        if (d.phone === myPh) return;
        if (!markers[d.phone]) {
            const icon = L.divIcon({ className: 'avatar-pin', iconSize: [120, 50], html: `<div class="pin-name">${d.nick}</div><div class="pin-dot"></div>` });
            markers[d.phone] = L.marker([d.lat, d.lng], {icon}).addTo(map).on('click', () => openSide(d.phone, d.nick));
        } else markers[d.phone].setLatLng([d.lat, d.lng]);
    }

    function openSide(ph, ni) {
        curF = ph; document.getElementById('s-nick').innerText = ni;
        document.getElementById('sidebar').classList.add('open'); renderChat();
    }
    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }

    function renderChat() {
        const box = document.getElementById('msg-feed'); box.innerHTML = "";
        (chatCache[curF] || []).forEach(m => {
            const div = document.createElement('div');
            div.className = `bubble ${m.from === myPh ? 'me' : 'them'}`;
            let h = "";
            if (m.replyTo) {
                const r = (chatCache[curF] || []).find(x => x.msgId === m.replyTo);
                if (r) h += `<span class="reply-hint">${r.text.substring(0,25)}...</span>`;
            }
            div.innerHTML = h + m.text;
            div.onclick = () => { replyId = m.msgId; document.getElementById('reply-box').classList.remove('hidden'); };
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function sendChat() {
        const i = document.getElementById('m-inp'); if(!i.value) return;
        const p = {type:'chat', target:curF, text:i.value, msgId: Date.now().toString(), replyTo: replyId};
        ws.send(JSON.stringify(p)); i.value = ""; cancelReply();
    }

    // --- AGORA VOIP ENGINE ---
    async function initiateAgoraCall() {
        const chan = "Room_" + Math.random().toString(36).substring(7);
        ws.send(JSON.stringify({type:'call_invite', target: curF, channel: chan}));
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('v-acc').classList.add('hidden');
        document.getElementById('v-nick').innerText = "Calling...";
        joinAgoraChannel(chan);
    }

    async function acceptAgoraCall() {
        ringSnd.pause();
        ws.send(JSON.stringify({type:'call_resp', target: window.caller, accept: true, channel: window.channel}));
        joinAgoraChannel(window.channel);
    }

    async function joinAgoraChannel(chan) {
        agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        // NOTE: Use a real App ID from Agora.io Console. 
        const APP_ID = "76657922d579477085a53907c08272f2"; 
        await agoraClient.join(APP_ID, chan, null);
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await agoraClient.publish([localAudioTrack]);
        
        agoraClient.on("user-published", async (user, mediaType) => {
            await agoraClient.subscribe(user, mediaType);
            if (mediaType === "audio") user.audioTrack.play();
        });
        document.getElementById('v-acc').classList.add('hidden');
        document.getElementById('v-nick').innerText = "LIVE CALL";
    }

    function endAgoraCall() {
        if(localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); }
        if(agoraClient) agoraClient.leave();
        document.getElementById('call-screen').style.display = 'none';
        ringSnd.pause();
    }

    function toast(t, m, ph, ni) {
        const d = document.createElement('div');
        d.className = 'toast'; d.innerHTML = `<strong>${t}</strong><br>${m}`;
        d.onclick = () => { if(ph) openSide(ph, ni); d.remove(); };
        document.getElementById('notif-hub').appendChild(d);
        setTimeout(() => d.remove(), 6000);
    }

    function addFriend() {
        const v = document.getElementById('f-inp').value; if(!v) return;
        const l = JSON.parse(localStorage.getItem('zenith_friends_v14') || "[]");
        if(!l.includes(v)) { l.push(v); localStorage.setItem('zenith_friends_v14', JSON.stringify(l)); }
        ws.send(JSON.stringify({type:'add_friend', target: v}));
        document.getElementById('f-inp').value = "";
    }

    function track() {
        navigator.geolocation.watchPosition(p => {
            if (ws.readyState === 1) ws.send(JSON.stringify({type:'location', lat:p.coords.latitude, lng:p.coords.longitude}));
        }, null, {enableHighAccuracy: true});
    }

    function cancelReply() { replyId = null; document.getElementById('reply-box').classList.add('hidden'); }
    function sendAlert() { ws.send(JSON.stringify({type:'alert', target: curF})); }
</script>
</body>
</html>
