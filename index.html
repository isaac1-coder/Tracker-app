<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #00B6FF; --red: #FF4B4B; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        #auth { position: fixed; inset: 0; z-index: 10001; background: var(--snap); display: flex; align-items: center; justify-content: center; text-align: center; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .hud { position: absolute; top: 20px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        .search { background: white; padding: 10px 25px; border-radius: 50px; display: flex; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        
        #sidebar { position: fixed; right: -100%; top: 0; bottom: 0; width: 350px; background: white; z-index: 5000; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; border-left: 1px solid #ddd; }
        #sidebar.open { right: 0; }
        
        .avatar { width: 50px; height: 50px; background: var(--snap); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px; }
        .transcript-box { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 15px; z-index: 6000; font-size: 14px; display: none; width: 85%; text-align: center; line-height: 1.4; }

        .call-ui { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; background: #fff; }
        .btn-black { width: 100%; padding: 15px; background: #000; color: #fff; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth">
    <div style="width: 320px;">
        <h1 style="font-size:60px; margin-bottom:10px">👻</h1>
        <input id="ph" type="tel" placeholder="Phone Number">
        <input id="ni" type="text" placeholder="Nickname">
        <input id="ps" type="password" placeholder="Password">
        <button onclick="saveAuth()" class="btn-black">LOG IN</button>
    </div>
</div>

<div class="hud"><div class="search"><input id="fIn" placeholder="Add phone #" style="border:none;outline:none;flex:1"><button onclick="addFriend()" style="border:none;background:none;color:var(--blue);font-weight:bold;cursor:pointer">ADD</button></div></div>

<div id="sidebar">
    <div style="padding:25px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
        <h2 id="sNick">Name</h2><button onclick="closeSide()" style="border:none;background:none;font-size:24px;cursor:pointer">✕</button>
    </div>
    <div style="padding:15px; display:flex; gap:10px; background:#f9f9f9">
        <button onclick="startVoiceCall()" style="flex:1; background:var(--blue); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer">CALL</button>
        <button onclick="sendAlert()" style="flex:1; background:var(--red); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer">ALERT</button>
    </div>
    <div id="msgs" style="flex:1; overflow:auto; padding:20px; display:flex; flex-direction:column; gap:10px"></div>
    <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px">
        <input id="cIn" onkeydown="if(event.key==='Enter') sendChat()" placeholder="Type message..." style="flex:1; background:#f0f0f0; border-radius:10px; padding:12px">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:12px 20px; border-radius:10px; font-weight:bold; cursor:pointer">SEND</button>
    </div>
</div>

<div class="call-ui" id="callUi">
    <h2>VOICE CALL ACTIVE</h2><h1 id="callNick" style="margin:20px 0; font-size:42px">...</h1>
    <button onclick="location.reload()" style="background:white; color:red; padding:15px 45px; border-radius:50px; border:none; font-weight:bold; cursor:pointer">END SESSION</button>
</div>

<div class="transcript-box" id="transBox">Transcription running...</div>
<div id="map"></div>
<audio id="rAudio" autoplay></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myP, markers = {}, curFriend, pc;
    const friendsKey = "snap_friends_persist";
    const authKey = "snap_auth_persist";

    window.onload = () => {
        const auth = JSON.parse(localStorage.getItem(authKey));
        if(auth) {
            document.getElementById('ph').value = auth.p;
            document.getElementById('ni').value = auth.n;
            document.getElementById('ps').value = auth.s;
            doAuth(auth.p, auth.n, auth.s);
        }
    };

    function saveAuth() {
        const p = document.getElementById('ph').value, n = document.getElementById('ni').value, s = document.getElementById('ps').value;
        localStorage.setItem(authKey, JSON.stringify({p, n, s}));
        doAuth(p, n, s);
    }

    function doAuth(p, n, s) {
        myP = p;
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, pass:s}));
            // SYNC FRIENDS ON RELOAD
            const list = JSON.parse(localStorage.getItem(friendsKey) || "[]");
            list.forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='auth_ok') { document.getElementById('auth').style.display='none'; initMap(); track(); }
            if(d.type==='loc') updateMarkers(d);
            if(d.type==='chat') renderChat(d);
            if(d.type==='ring_alert') { new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3').play(); }
            if(d.type==='call_signal') handleCallSignal(d);
        };
    }

    function initMap() {
        if(map) return;
        map = L.map('map', {zoomControl: false}).setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        // FORCE MAP RENDER FIX
        setInterval(() => map.invalidateSize(), 1000);
    }

    function track() {
        navigator.geolocation.watchPosition(pos => {
            if(ws.readyState === 1) ws.send(JSON.stringify({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude}));
        }, null, {enableHighAccuracy:true});
    }

    function updateMarkers(d) {
        if(d.p === myP) return;
        if(!markers[d.p]) {
            const icon = L.divIcon({className:'', html:`<div class="avatar">${d.n[0]}</div>`});
            markers[d.p] = L.marker([d.lat, d.lng], {icon}).addTo(map).on('click', () => {
                curFriend = d.p; document.getElementById('sNick').innerText = d.n; document.getElementById('sidebar').classList.add('open');
            });
        } else markers[d.p].setLatLng([d.lat, d.lng]);
    }

    function addFriend() {
        const v = document.getElementById('fIn').value;
        if(!v) return;
        const list = JSON.parse(localStorage.getItem(friendsKey) || "[]");
        if(!list.includes(v)) { list.push(v); localStorage.setItem(friendsKey, JSON.stringify(list)); }
        ws.send(JSON.stringify({type:'add_friend', target:v}));
        document.getElementById('fIn').value = "";
    }

    // WEBRTC CALLING
    async function startVoiceCall() {
        document.getElementById('callUi').style.display='flex';
        document.getElementById('callNick').innerText = document.getElementById('sNick').innerText;
        pc = new RTCPeerConnection({iceServers: [{urls:'stun:stun.l.google.com:19302'}]});
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({type:'call_signal', target:curFriend, candidate:e.candidate}));
        pc.ontrack = e => document.getElementById('rAudio').srcObject = e.streams[0];
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type:'call_signal', target:curFriend, sdp:offer}));
        setupTranscription();
    }

    async function handleCallSignal(d) {
        if(!pc) {
            pc = new RTCPeerConnection({iceServers: [{urls:'stun:stun.l.google.com:19302'}]});
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({type:'call_signal', target:d.from, candidate:e.candidate}));
            pc.ontrack = e => document.getElementById('rAudio').srcObject = e.streams[0];
            document.getElementById('callUi').style.display='flex';
            document.getElementById('callNick').innerText = d.fromNick;
            setupTranscription();
        }
        if(d.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
            if(d.sdp.type==='offer') {
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                ws.send(JSON.stringify({type:'call_signal', target:d.from, sdp:ans}));
            }
        } else if(d.candidate) await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
    }

    function setupTranscription() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        const rec = new Speech();
        rec.continuous = true; rec.interimResults = true;
        rec.onresult = e => {
            const txt = e.results[e.results.length-1][0].transcript;
            const box = document.getElementById('transBox');
            box.style.display='block'; box.innerText = txt;
        };
        rec.start();
    }

    function sendChat() {
        const i = document.getElementById('cIn');
        if(!i.value) return;
        ws.send(JSON.stringify({type:'chat', target:curFriend, text:i.value}));
        i.value = "";
    }
    function renderChat(d) {
        const m = document.getElementById('msgs');
        const div = document.createElement('div');
        div.style.background = d.from === myP ? "var(--blue)" : "#eee";
        div.style.color = d.from === myP ? "white" : "black";
        div.style.padding = "10px"; div.style.borderRadius = "10px"; div.style.alignSelf = d.from === myP ? "flex-end" : "flex-start";
        div.innerText = d.text; m.appendChild(div); m.scrollTop = m.scrollHeight;
    }
    function sendAlert() { ws.send(JSON.stringify({type:'alert', target:curFriend})); }
    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }
</script>
</body>
</html>
