<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #0784FF; --red: #FF3B30; --dark: #121212; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; width: 100vw; overflow: hidden; background: var(--dark); color: white; }
        
        #map { position: absolute; inset: 0; z-index: 0; filter: grayscale(1) invert(1) contrast(0.8); }

        /* Auth */
        #auth { position: fixed; inset: 0; z-index: 10000; background: var(--snap); display: flex; align-items: center; justify-content: center; color: black; }
        input { width: 100%; padding: 18px; margin: 8px 0; border-radius: 15px; border: none; font-size: 16px; outline: none; background: white; }
        .btn-black { width: 100%; padding: 18px; background: black; color: white; border-radius: 50px; border: none; font-weight: bold; margin-top: 10px; }

        /* UI Overlays */
        .hud { position: absolute; top: 15px; width: 100%; z-index: 100; display: flex; justify-content: center; pointer-events: none; }
        .search { background: rgba(30,30,30,0.9); backdrop-filter: blur(20px); padding: 5px 15px; border-radius: 50px; display: flex; pointer-events: auto; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        
        #sidebar { position: fixed; left: 0; bottom: -100%; width: 100%; height: 94%; background: #1a1a1a; z-index: 2000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-radius: 30px 30px 0 0; display: flex; flex-direction: column; }
        #sidebar.open { bottom: 0; }
        
        .side-head { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .friend-list { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; display: flex; gap: 10px; pointer-events: auto; }
        .f-pill { background: white; color: black; padding: 10px 20px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 14px; }

        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .m { padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 80%; line-height: 1.4; position: relative; background: #333; }
        .m.me { align-self: flex-end; background: var(--blue); }
        .m .reply { font-size: 11px; opacity: 0.6; display: block; margin-bottom: 4px; border-left: 2px solid #fff; padding-left: 5px; }
        .m .thumbs { position: absolute; bottom: -10px; right: 10px; background: #444; border-radius: 10px; padding: 2px 6px; font-size: 12px; }

        /* Calling */
        #call-ui { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .ring { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .transcript { position: fixed; bottom: 120px; width: 80%; left: 10%; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; z-index: 6000; font-size: 14px; text-align: center; border: 1px solid #444; display: none; }
        .marker-dot { width: 15px; height: 15px; background: var(--blue); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--blue); pointer-events: none; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-box" style="width:320px">
        <h1>👻</h1>
        <input id="ph" type="tel" placeholder="Phone Number">
        <input id="ni" type="text" placeholder="Nickname">
        <input id="ps" type="password" placeholder="Password">
        <button onclick="doAuth()" class="btn-black">LOG IN</button>
    </div>
</div>

<div class="hud"><div class="search"><input id="fIn" placeholder="Phone #" style="background:transparent; color:white; flex:1; border:none"><button onclick="addFriend()" style="color:var(--snap); background:none; border:none; font-weight:bold">ADD</button></div></div>

<div class="friend-list" id="fList"></div>

<div id="sidebar">
    <div class="side-head"><h2 id="sNick">Name</h2><button onclick="closeSide()" style="background:none; border:none; color:white; font-size:24px">✕</button></div>
    <div style="padding:10px; display:flex; gap:10px; border-bottom:1px solid #333">
        <button onclick="initCall()" style="flex:1; background:var(--blue); border:none; color:white; padding:12px; border-radius:12px; font-weight:bold">VOICE CALL</button>
    </div>
    <div id="msgs"></div>
    <div id="reply-preview" style="display:none; padding:10px; background:#222; font-size:12px">Replying to... <button onclick="clearReply()">✕</button></div>
    <div style="padding:15px; display:flex; gap:10px; padding-bottom: 30px">
        <input id="cIn" placeholder="Type a message..." style="flex:1; background:#333; color:white" onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:var(--snap); color:black; border:none; padding:0 20px; border-radius:15px; font-weight:bold">SEND</button>
    </div>
</div>

<div id="call-ui">
    <h2 id="call-status">INCOMING CALL</h2>
    <h1 id="call-nick" style="font-size:48px; margin:30px 0" class="ring">Name</h1>
    <div style="display:flex; gap:20px">
        <button onclick="callResp(false)" style="background:var(--red); padding:15px 40px; border-radius:50px; border:none; color:white; font-weight:bold">DECLINE</button>
        <button onclick="callResp(true)" style="background:white; padding:15px 40px; border-radius:50px; border:none; color:black; font-weight:bold">ACCEPT</button>
    </div>
</div>

<div class="transcript" id="transBox"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myP, markers = {}, curF, chatH = [], replyID = null, audioRec;
    const ringSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/1350/1350-preview.mp3'); ringSnd.loop = true;

    function doAuth() {
        const p=document.getElementById('ph').value, n=document.getElementById('ni').value, s=document.getElementById('ps').value;
        myP = p; const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.binaryType = "arraybuffer";
        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, pass:s}));
            JSON.parse(localStorage.getItem("f_list") || "[]").forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };
        ws.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) { handleAudioChunk(e.data); return; }
            const d = JSON.parse(e.data);
            if(d.type==='auth_ok') { document.getElementById('auth').style.display='none'; initMap(); track(); }
            if(d.type==='loc') updateLoc(d);
            if(d.type==='chat') { chatH.push(d); if(curF === (d.from===myP?d.target:d.from)) renderChat(); }
            if(d.type==='react') { 
                const msg = chatH.find(m => m.id === d.msgID);
                if(msg) { msg.thumbs = (msg.thumbs || 0) + 1; renderChat(); }
            }
            if(d.type==='call_invite') { 
                document.getElementById('call-ui').style.display='flex'; 
                document.getElementById('call-nick').innerText = d.fromNick; 
                window.caller = d.from; ringSnd.play(); 
            }
            if(d.type==='call_resp') {
                if(d.accept) startStreaming();
                else { alert("Call Declined"); ringSnd.pause(); }
            }
            if(d.type==='transcription') {
                const box = document.getElementById('transBox');
                box.innerText = d.text; box.style.display = 'block';
                setTimeout(() => box.style.display='none', 3000);
            }
        };
    }

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setInterval(() => map.invalidateSize(), 1000);
    }

    function track() {
        navigator.geolocation.watchPosition(pos => {
            ws.send(JSON.stringify({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude}));
        });
    }

    function updateLoc(d) {
        if(d.p === myP) return;
        if(!markers[d.p]) {
            const icon = L.divIcon({className:'', html:'<div class="marker-dot"></div>'});
            markers[d.p] = L.marker([d.lat, d.lng], {icon, interactive: false}).addTo(map);
            const btn = document.createElement('div'); btn.className='f-pill'; btn.innerText=d.n;
            btn.onclick = () => openSide(d.p, d.n);
            document.getElementById('fList').appendChild(btn);
        } else markers[d.p].setLatLng([d.lat, d.lng]);
    }

    function openSide(p, n) { curF = p; document.getElementById('sNick').innerText=n; document.getElementById('sidebar').classList.add('open'); renderChat(); }
    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }

    function sendChat() {
        const i = document.getElementById('cIn'); if(!i.value) return;
        const msg = {type:'chat', target:curF, text:i.value, id: Date.now(), replyTo: replyID};
        ws.send(JSON.stringify(msg)); i.value = ""; clearReply();
    }

    function renderChat() {
        const b = document.getElementById('msgs'); b.innerHTML = "";
        chatH.filter(m => (m.from===myP && m.target===curF) || (m.from===curF && m.target===myP)).forEach(m => {
            const div = document.createElement('div'); div.className = `m ${m.from===myP?'me':'them'}`;
            let html = m.text;
            if(m.replyTo) { 
                const r = chatH.find(x => x.id === m.replyTo);
                if(r) html = `<span class="reply">${r.text.substring(0,20)}...</span>` + html;
            }
            div.innerHTML = html + (m.thumbs ? `<span class="thumbs">👍 ${m.thumbs}</span>` : "");
            div.onclick = () => { replyID = m.id; document.getElementById('reply-preview').style.display='block'; };
            div.oncontextmenu = (e) => { e.preventDefault(); ws.send(JSON.stringify({type:'react', target:curF, msgID: m.id})); };
            b.appendChild(div);
        });
        b.scrollTop = b.scrollHeight;
    }

    // 1-SECOND CHUNKED VOIP
    async function initCall() {
        ws.send(JSON.stringify({type:'call_invite', target:curF, fromNick: myNick}));
        document.getElementById('call-status').innerText = "DIALING...";
        document.getElementById('call-ui').style.display = 'flex';
    }

    async function callResp(acc) {
        ringSnd.pause();
        document.getElementById('call-ui').style.display = 'none';
        ws.send(JSON.stringify({type:'call_resp', target: window.caller, accept: acc}));
        if(acc) { curF = window.caller; startStreaming(); }
    }

    async function startStreaming() {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        audioRec = new MediaRecorder(stream);
        
        // Setup Transcription
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.continuous = true; rec.interimResults = true;
            rec.onresult = e => {
                const t = e.results[e.results.length-1][0].transcript;
                ws.send(JSON.stringify({type:'transcription', target:curF, text: t}));
            };
            rec.start();
        }

        audioRec.ondataavailable = e => { if(e.data.size > 0) ws.send(e.data); };
        audioRec.start(1000); // 1-second chunks sent to backend RAM
    }

    function handleAudioChunk(arrayBuffer) {
        const blob = new Blob([arrayBuffer], { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
    }

    function addFriend() {
        const v = document.getElementById('fIn').value;
        const list = JSON.parse(localStorage.getItem("f_list") || "[]");
        if(!list.includes(v)) { list.push(v); localStorage.setItem("f_list", JSON.stringify(list)); }
        ws.send(JSON.stringify({type:'add_friend', target:v}));
    }
    function clearReply() { replyID = null; document.getElementById('reply-preview').style.display='none'; }
</script>
</body>
</html>
