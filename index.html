<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #00B6FF; --red: #FF4B4B; }
        * { box-sizing: border-box; font-family: 'Avenir Next', sans-serif; margin: 0; padding: 0; }
        body { background: #e5e5e5; height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: var(--snap); display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-box { width: 320px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-black { width: 100%; padding: 15px; border-radius: 50px; background: black; color: white; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* Map UI */
        #map { height: 100vh; width: 100vw; background: #f3f3f3; }
        .hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .search { background: white; width: 90%; max-width: 400px; padding: 10px 20px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; pointer-events: auto; }

        /* CIRCLE MARKER FIX */
        .snap-marker { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .avatar { 
            width: 50px !important; height: 50px !important; 
            background: var(--snap); border: 4px solid white; 
            border-radius: 50% !important; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px;
        }
        .nick-label { background: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 900; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: nowrap; }

        /* SIDEBAR */
        #sidebar { 
            position: fixed; right: -100%; top: 0; bottom: 0; width: 350px; 
            background: white; z-index: 5000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #sidebar.open { right: 0; }
        .side-header { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .side-tools { padding: 10px 25px; display: flex; gap: 10px; border-bottom: 1px solid #eee; }
        .tool-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }

        #chat-msgs { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 20px; font-size: 14px; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #f0f0f0; color: black; border-bottom-left-radius: 4px; }

        /* Call Overlay */
        #call-overlay { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        
        .snap-note { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10000; cursor: pointer; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
        .hidden { display: none !important; }

        @media (max-width: 400px) { #sidebar { width: 100%; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-size: 60px;">👻</h1>
        <input id="phone" type="tel" placeholder="Phone Number">
        <input id="nick" type="text" placeholder="Nickname">
        <input id="pass" type="password" placeholder="Password">
        <button class="btn-black" onclick="handleLogin()">LOG IN</button>
    </div>
</div>

<div class="hud hidden" id="hud">
    <div class="search">
        <input id="fInput" placeholder="Add friend by phone #" style="border:none; width:100%; outline:none">
        <button onclick="addF()" style="background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer">ADD</button>
    </div>
</div>

<div id="sidebar">
    <div class="side-header">
        <h2 id="side-nick">Friend</h2>
        <button onclick="closeSide()" style="background:none; border:none; font-size:20px; cursor:pointer">✕</button>
    </div>
    <div class="side-tools">
        <button class="tool-btn" style="background:var(--blue)" onclick="startCall()">CALL</button>
        <button class="tool-btn" style="background:var(--red)" onclick="sendAlert()">ALERT</button>
    </div>
    <div id="chat-msgs"></div>
    <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px">
        <input id="cInput" placeholder="Send a Chat..." style="background:#f0f0f0; margin:0; outline:none" onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:0 20px; border-radius:15px; font-weight:bold">SEND</button>
    </div>
</div>

<div id="call-overlay">
    <h2>INCOMING CALL</h2>
    <h1 id="call-nick" style="font-size: 40px; margin: 20px 0;">Friend</h1>
    <div style="display:flex; gap:20px">
        <button onclick="endCall()" style="background:red; color:white; padding:15px 40px; border-radius:50px; border:none; font-weight:bold">END</button>
        <button onclick="acceptCall()" style="background:white; color:var(--blue); padding:15px 40px; border-radius:50px; border:none; font-weight:bold">ACCEPT</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myPhone, myNick, markers = {}, curFriendPhone, chatHistory = {};
    const ringAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

    // AUTO-LOGIN ON LOAD
    window.onload = () => {
        const cached = JSON.parse(localStorage.getItem('user_cache'));
        if (cached) {
            document.getElementById('phone').value = cached.phone;
            document.getElementById('nick').value = cached.nick;
            document.getElementById('pass').value = cached.pass;
            login(cached.phone, cached.nick, cached.pass);
        }
    };

    function handleLogin() {
        const p = document.getElementById('phone').value;
        const n = document.getElementById('nick').value;
        const s = document.getElementById('pass').value;
        localStorage.setItem('user_cache', JSON.stringify({phone: p, nick: n, pass: s}));
        login(p, n, s);
    }

    function login(phone, nick, pass) {
        myPhone = phone;
        myNick = nick;
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws`);

        ws.onopen = () => ws.send(JSON.stringify({type:'auth', phone:phone, nick:nick, pass:pass}));
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='auth_success') {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('hud').classList.remove('hidden');
                initMap();
                track();
            }
            if(d.type==='loc_update') updateMap(d);
            if(d.type==='chat_msg') {
                const partner = d.fromPhone === myPhone ? curFriendPhone : d.fromPhone;
                if(!chatHistory[partner]) chatHistory[partner] = [];
                chatHistory[partner].push(d);
                if(curFriendPhone === partner) renderHistory();
                if(d.fromPhone !== myPhone) showNote(d.fromNick, d.text, d.fromPhone);
            }
            if(d.type==='ring') { ringAudio.play(); showNote("ALERT!", d.from + " is ringing you!", ""); }
            if(d.type==='incoming_call') {
                document.getElementById('call-overlay').style.display='flex';
                document.getElementById('call-nick').innerText = d.from;
            }
        };
    }

    function initMap() {
        if(map) return;
        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager_all/{z}/{x}/{y}{r}.png').addTo(map);
        setTimeout(() => map.invalidateSize(), 500);
    }

    function track() {
        navigator.geolocation.watchPosition(p => {
            if(ws.readyState === 1) ws.send(JSON.stringify({type:'location', lat:p.coords.latitude, lng:p.coords.longitude}));
        }, null, {enableHighAccuracy:true});
    }

    function updateMap(d) {
        if(d.phone === myPhone) return;
        const pos = [d.lat, d.lng];
        if(!markers[d.phone]) {
            const icon = L.divIcon({
                className: 'snap-marker',
                iconSize: [50, 70],
                html: `<div class="avatar">${d.nick.substring(0,1)}</div><div class="nick-label">${d.nick}</div>`
            });
            markers[d.phone] = L.marker(pos, {icon: icon}).addTo(map).on('click', () => openSide(d.phone, d.nick));
        } else {
            markers[d.phone].setLatLng(pos);
        }
    }

    function openSide(phone, nick) {
        curFriendPhone = phone;
        document.getElementById('side-nick').innerText = nick;
        document.getElementById('sidebar').classList.add('open');
        renderHistory();
    }

    function closeSide() { document.getElementById('sidebar').classList.remove('open'); curFriendPhone = null; }

    function renderHistory() {
        const box = document.getElementById('chat-msgs');
        box.innerHTML = "";
        (chatHistory[curFriendPhone] || []).forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.fromPhone === myPhone ? 'me' : 'them'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function sendChat() {
        const input = document.getElementById('cInput');
        if(!input.value || !curFriendPhone) return;
        ws.send(JSON.stringify({type:'chat', target: curFriendPhone, text: input.value}));
        input.value = "";
    }

    function sendAlert() { ws.send(JSON.stringify({type:'alert', target: curFriendPhone})); }
    function startCall() { ws.send(JSON.stringify({type:'call_request', target: curFriendPhone})); showNote("Calling...", "Waiting for answer", ""); }

    function showNote(title, msg, phone) {
        const n = document.createElement('div');
        n.className = 'snap-note';
        n.innerHTML = `<strong>${title}</strong><br>${msg}`;
        if(phone) n.onclick = () => { openSide(phone, title); n.remove(); };
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    function addF() {
        const val = document.getElementById('fInput').value;
        if(val) ws.send(JSON.stringify({type:'add_friend', target: val}));
        document.getElementById('fInput').value = "";
    }

    function endCall() { document.getElementById('call-overlay').style.display='none'; }
    function acceptCall() { document.getElementById('call-overlay').style.background='black'; }
</script>
</body>
</html>
