<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --snap: #FFFC00; --blue: #00B6FF; --red: #FF4B4B; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #333; }
        
        #auth { position: fixed; inset: 0; z-index: 10001; background: var(--snap); display: flex; align-items: center; justify-content: center; text-align: center; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #222; }

        .hud { position: absolute; top: 20px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        .search { background: white; padding: 10px 20px; border-radius: 50px; display: flex; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        #sidebar { position: fixed; right: -100%; top: 0; bottom: 0; width: 350px; background: white; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #sidebar.open { right: 0; }
        
        .avatar { width: 50px; height: 50px; background: var(--snap); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .transcript { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 10px; z-index: 6000; font-size: 14px; max-width: 80%; display: none; }

        .call-ui { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<div id="auth">
    <div style="width: 300px;">
        <h1 style="font-size:50px">👻</h1>
        <input id="ph" type="tel" placeholder="Phone #">
        <input id="ni" type="text" placeholder="Nickname">
        <input id="ps" type="password" placeholder="Password">
        <button onclick="doAuth()" style="width:100%; padding:15px; background:black; color:white; border-radius:50px; margin-top:10px; font-weight:bold; border:none">LOGIN</button>
    </div>
</div>

<div class="hud"><div class="search"><input id="fIn" placeholder="Add Friend Phone" style="border:none;outline:none"><button onclick="addFriend()">ADD</button></div></div>

<div id="sidebar">
    <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
        <h2 id="sNick">Friend</h2><button onclick="closeSide()">✕</button>
    </div>
    <div style="padding:10px; display:flex; gap:10px">
        <button onclick="startAudioCall()" style="flex:1; background:var(--blue); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold">CALL</button>
        <button onclick="ws.send(JSON.stringify({type:'alert', target:curFriend}))" style="flex:1; background:var(--red); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold">ALERT</button>
    </div>
    <div id="msgs" style="flex:1; overflow:auto; padding:15px"></div>
    <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:5px">
        <input id="cIn" onkeydown="if(event.key==='Enter') sendChat()" style="flex:1; background:#eee; padding:10px; border-radius:10px; border:none">
        <button onclick="sendChat()" style="background:var(--snap); border:none; padding:10px; border-radius:10px; font-weight:bold">SEND</button>
    </div>
</div>

<div class="call-ui" id="callUi">
    <h2>AUDIO CALL</h2><h1 id="callNick">...</h1>
    <div style="margin-top:20px">
        <button onclick="location.reload()" style="background:white; color:red; padding:15px 30px; border-radius:50px; border:none; font-weight:bold">END CALL</button>
    </div>
</div>

<div class="transcript" id="transcript">Listening...</div>
<div id="map"></div>
<audio id="remoteAudio" autoplay></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let ws, map, myP, markers = {}, curFriend, pc;
    const cacheKey = "snap_friends";

    function doAuth() {
        const p = document.getElementById('ph').value, n = document.getElementById('ni').value, s = document.getElementById('ps').value;
        myP = p;
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, pass:s}));
            // Persist friends on reload
            const friends = JSON.parse(localStorage.getItem(cacheKey) || "[]");
            friends.forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='auth_ok') { document.getElementById('auth').style.display='none'; initMap(); startTracking(); }
            if(d.type==='loc') updateMap(d);
            if(d.type==='chat') renderChat(d);
            if(d.type==='ring_alert') { new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3').play(); }
            if(d.type==='call_signal') handleWebRTC(d);
        };
    }

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([0,0], 2);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setTimeout(() => map.invalidateSize(), 500);
    }

    function startTracking() {
        navigator.geolocation.watchPosition(p => {
            ws.send(JSON.stringify({type:'location', lat:p.coords.latitude, lng:p.coords.longitude}));
        });
    }

    function updateMap(d) {
        if(d.p === myP) return;
        if(!markers[d.p]) {
            const icon = L.divIcon({className:'', html:`<div class="avatar">${d.n[0]}</div>`});
            markers[d.p] = L.marker([d.lat, d.lng], {icon}).addTo(map).on('click', () => {
                curFriend = d.p; document.getElementById('sNick').innerText = d.n; document.getElementById('sidebar').classList.add('open');
            });
        } else markers[d.p].setLatLng([d.lat, d.lng]);
    }

    function addFriend() {
        const v = document.getElementById('fIn').value;
        const friends = JSON.parse(localStorage.getItem(cacheKey) || "[]");
        if(!friends.includes(v)) { friends.push(v); localStorage.setItem(cacheKey, JSON.stringify(friends)); }
        ws.send(JSON.stringify({type:'add_friend', target:v}));
    }

    // WEBRTC CALLING & TRANSCRIPTION
    async function startAudioCall() {
        document.getElementById('callUi').style.display='flex';
        pc = new RTCPeerConnection();
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({type:'call_signal', target:curFriend, candidate:e.candidate}));
        pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type:'call_signal', target:curFriend, sdp:offer}));
        startTranscription();
    }

    async function handleWebRTC(d) {
        if(!pc) {
            pc = new RTCPeerConnection();
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({type:'call_signal', target:d.from, candidate:e.candidate}));
            pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];
            document.getElementById('callUi').style.display='flex';
            startTranscription();
        }
        if(d.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
            if(d.sdp.type==='offer') {
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                ws.send(JSON.stringify({type:'call_signal', target:d.from, sdp:ans}));
            }
        } else if(d.candidate) await pc.addIceCandidate(new RTCIceCandidate(d.candidate));
    }

    function startTranscription() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = true; rec.interimResults = true;
        rec.onresult = e => {
            const txt = e.results[e.results.length-1][0].transcript;
            const el = document.getElementById('transcript');
            el.style.display='block'; el.innerText = txt;
        };
        rec.start();
    }

    function sendChat() {
        const i = document.getElementById('cIn');
        ws.send(JSON.stringify({type:'chat', target:curFriend, text:i.value}));
        i.value = "";
    }
    function renderChat(d) {
        const div = document.createElement('div');
        div.innerText = d.nick + ": " + d.text;
        document.getElementById('msgs').appendChild(div);
    }
    function closeSide() { document.getElementById('sidebar').classList.remove('open'); }
</script>
</body>
</html>
