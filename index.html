<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tracker Pro Ultra</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-blue: #00B6FF;
            --snap-red: #FF3B30;
            --bg-dark: #121212;
            --card-dark: #1E1E1E;
            --text-main: #FFFFFF;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body, html {
            height: 100dvh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            position: fixed;
        }

        /* MAP STYLING */
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #222;
        }

        /* AUTH SCREEN */
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--snap-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .auth-card {
            width: 85%;
            max-width: 380px;
            text-align: center;
            padding: 40px 20px;
        }

        .auth-card h1 { font-size: 72px; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        input {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            outline: none;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-black {
            width: 100%;
            padding: 20px;
            background: #000;
            color: #fff;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        .btn-black:active { transform: scale(0.96); }

        /* HUD & NAVIGATION */
        .top-hud {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 5px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            pointer-events: auto;
        }

        .search-container input {
            flex: 1;
            background: transparent;
            box-shadow: none;
            padding: 12px;
            margin: 0;
            font-size: 15px;
        }

        /* SIDEBAR / CHAT */
        #chat-sidebar {
            position: fixed;
            left: 0;
            bottom: -100%;
            width: 100%;
            height: 94dvh;
            background: #1a1a1a;
            z-index: 5000;
            border-radius: 30px 30px 0 0;
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            color: white;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        #chat-sidebar.open { bottom: 0; }

        .chat-header {
            padding: 25px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-tools {
            display: flex;
            gap: 12px;
            padding: 15px 25px;
            background: #222;
        }

        .tool-btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
        }

        #msg-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 16px;
            max-width: 85%;
            line-height: 1.4;
            position: relative;
            background: #333;
        }

        .bubble.me { align-self: flex-end; background: var(--snap-blue); }
        .bubble.them { align-self: flex-start; background: #444; }
        
        .bubble .reply-text {
            font-size: 11px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: block;
        }

        .reaction {
            position: absolute;
            bottom: -12px;
            right: 5px;
            background: #222;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            border: 1px solid #444;
        }

        /* NOTIFICATIONS */
        #notification-center {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
            pointer-events: none;
        }

        .snap-toast {
            background: white;
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            pointer-events: auto;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-left: 6px solid var(--snap-blue);
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* CALL OVERLAY */
        #call-ui {
            position: fixed;
            inset: 0;
            background: var(--snap-blue);
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .call-nick { font-size: 56px; font-weight: 900; margin: 30px 0; }
        .call-btn-row { display: flex; gap: 20px; }
        
        .circle-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            font-size: 14px;
        }

        /* MAP MARKERS */
        .marker-icon {
            width: 50px !important;
            height: 50px !important;
            background: var(--snap-yellow);
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            font-size: 20px;
            color: #000;
        }

        .marker-label {
            background: white;
            color: black;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            margin-top: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1>👻</h1>
        <input id="auth-phone" type="tel" placeholder="Phone Number" inputmode="tel">
        <input id="auth-nick" type="text" placeholder="Nickname">
        <input id="auth-pass" type="password" placeholder="Password">
        <button class="btn-black" onclick="handleAuth()">INITIALIZE</button>
    </div>
</div>

<div class="top-hud hidden" id="main-hud">
    <div class="search-container">
        <input id="friend-input" placeholder="Add friend by phone #">
        <button onclick="addFriend()" style="background:none; border:none; color:var(--snap-blue); font-weight:800; font-size:14px; cursor:pointer">ADD</button>
    </div>
</div>

<div id="chat-sidebar">
    <div class="chat-header">
        <h2 id="current-chat-name">Nickname</h2>
        <button onclick="closeSidebar()" style="background:none; border:none; color:white; font-size:32px; padding:10px">✕</button>
    </div>
    <div class="chat-tools">
        <button onclick="triggerCall()" class="tool-btn" style="background:var(--snap-blue)">Call</button>
        <button onclick="sendQuickAlert()" class="tool-btn" style="background:var(--snap-red)">Alert</button>
    </div>
    <div id="msg-container"></div>
    <div id="reply-box" class="hidden" style="background:#222; padding:10px; font-size:12px; border-top:1px solid #333">
        Replying to... <button onclick="cancelReply()" style="color:red">✕</button>
    </div>
    <div style="padding:15px; display:flex; gap:10px; padding-bottom: 40px">
        <input id="chat-input" onkeydown="if(event.key==='Enter') sendChatMessage()" placeholder="Type a message..." style="flex:1; background:#2a2a2a; color:white; border-radius:15px">
        <button onclick="sendChatMessage()" style="background:var(--snap-yellow); border:none; padding:0 20px; border-radius:15px; font-weight:800; color:#000">SEND</button>
    </div>
</div>

<div id="call-ui">
    <h2 id="call-label">INCOMING CALL</h2>
    <h1 id="call-target-nick" class="call-nick">Friend</h1>
    <div class="call-btn-row">
        <button class="circle-btn" style="background:var(--snap-red); color:white" onclick="respondCall(false)">DECLINE</button>
        <button id="accept-btn" class="circle-btn" style="background:white; color:var(--snap-blue)" onclick="respondCall(true)">ACCEPT</button>
    </div>
    <div id="live-transcription" style="margin-top:40px; background:rgba(0,0,0,0.5); padding:20px; border-radius:20px; width:80%; font-size:18px">...</div>
</div>

<div id="notification-center"></div>
<div id="map"></div>
<audio id="remote-audio-player" autoplay playsinline></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- APP STATE ---
    let ws, map, myPhone, myNick, markers = {}, curFriendPhone, chatHistory = [], activeReplyId = null;
    const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1350/1350-preview.mp3'); ringtone.loop = true;
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');

    // --- INITIALIZATION ---
    window.onload = () => {
        const cache = JSON.parse(localStorage.getItem('tracker_v5_cache'));
        if (cache) {
            document.getElementById('auth-phone').value = cache.p;
            document.getElementById('auth-nick').value = cache.n;
            document.getElementById('auth-pass').value = cache.s;
            performLogin(cache.p, cache.n, cache.s);
        }
    };

    function handleAuth() {
        const p = document.getElementById('auth-phone').value;
        const n = document.getElementById('auth-nick').value;
        const s = document.getElementById('auth-pass').value;
        if (!p || !n || !s) return alert("All fields required");
        localStorage.setItem('tracker_v5_cache', JSON.stringify({p, n, s}));
        performLogin(p, n, s);
    }

    function performLogin(p, n, s) {
        myPhone = p; myNick = n;
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws`);
        ws.binaryType = "arraybuffer";

        ws.onopen = () => {
            ws.send(JSON.stringify({type:'auth', phone:p, nick:n, text:s}));
            // Restore persistent friends
            const list = JSON.parse(localStorage.getItem('tracker_v5_friends') || "[]");
            list.forEach(f => ws.send(JSON.stringify({type:'add_friend', target:f})));
        };

        ws.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) { handleBinaryAudio(e.data); return; }
            const d = JSON.parse(e.data);
            handleJsonMessage(d);
        };
    }

    // --- UI LOGIC ---
    function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: false, tap: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager_all/{z}/{x}/{y}{r}.png').addTo(map);
        // Map anti-black-hole fix
        setInterval(() => map.invalidateSize(), 1500);
    }

    function handleJsonMessage(d) {
        switch(d.type) {
            case 'auth_ok':
                document.getElementById('auth-overlay').style.transform = 'translateY(-100%)';
                document.getElementById('main-hud').classList.remove('hidden');
                initMap();
                startTracking();
                break;
            case 'loc':
                updateMapMarker(d);
                break;
            case 'chat':
                chatHistory.push(d);
                if (curFriendPhone === (d.from === myPhone ? d.target : d.from)) renderChat();
                if (d.from !== myPhone && !document.getElementById('chat-sidebar').classList.contains('open')) {
                    showToast(d.fromNick, d.text, d.from);
                }
                break;
            case 'react':
                const m = chatHistory.find(x => x.msgId === d.msgId);
                if (m) { m.reaction = "👍"; renderChat(); }
                break;
            case 'ring_alert':
                alertSound.play();
                showToast("ALERT", `${d.from} is ringing you!`, "");
                break;
            case 'call_invite':
                showCallUI(d.from, d.fromNick);
                break;
            case 'call_response':
                if (d.accept) beginVoiceStreaming();
                else { alert("Call declined"); endCallUI(); }
                break;
            case 'transcription':
                document.getElementById('live-transcription').innerText = d.text;
                break;
            case 'note':
                showToast("System", d.msg, "");
                break;
        }
    }

    function updateMapMarker(d) {
        if (d.phone === myPhone) return;
        const ll = [d.lat, d.lng];
        if (!markers[d.phone]) {
            const icon = L.divIcon({
                className: '',
                iconSize: [50, 70],
                html: `<div class="marker-icon">${d.nick[0]}</div><div class="marker-label">${d.nick}</div>`
            });
            markers[d.phone] = L.marker(ll, {icon}).addTo(map).on('click', () => openChat(d.phone, d.nick));
        } else {
            markers[d.phone].setLatLng(ll);
        }
    }

    function openChat(phone, nick) {
        curFriendPhone = phone;
        document.getElementById('current-chat-name').innerText = nick;
        document.getElementById('chat-sidebar').classList.add('open');
        renderChat();
    }

    function closeSidebar() { document.getElementById('chat-sidebar').classList.remove('open'); curFriendPhone = null; }

    function renderChat() {
        const box = document.getElementById('msg-container');
        box.innerHTML = "";
        chatHistory.filter(m => (m.from === myPhone && m.target === curFriendPhone) || (m.from === curFriendPhone && m.target === myPhone)).forEach(m => {
            const div = document.createElement('div');
            div.className = `bubble ${m.from === myPhone ? 'me' : 'them'}`;
            
            let html = "";
            if (m.replyTo) {
                const r = chatHistory.find(x => x.msgId === m.replyTo);
                if (r) html += `<span class="reply-text">${r.text.substring(0,30)}...</span>`;
            }
            html += m.text;
            if (m.reaction) html += `<span class="reaction">${m.reaction}</span>`;

            div.innerHTML = html;
            div.onclick = () => setReply(m.msgId);
            div.oncontextmenu = (e) => {
                e.preventDefault();
                ws.send(JSON.stringify({type:'react', target: curFriendPhone, msgId: m.msgId}));
            };
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function sendChatMessage() {
        const inp = document.getElementById('chat-input');
        if (!inp.value) return;
        const p = {
            type: 'chat',
            target: curFriendPhone,
            text: inp.value,
            msgId: Date.now().toString(),
            replyTo: activeReplyId
        };
        ws.send(JSON.stringify(p));
        inp.value = "";
        cancelReply();
    }

    // --- VOIP & CALLING ---
    function triggerCall() {
        ws.send(JSON.stringify({type:'call_invite', target: curFriendPhone}));
        document.getElementById('call-label').innerText = "DIALING...";
        document.getElementById('call-target-nick').innerText = document.getElementById('current-chat-name').innerText;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('accept-btn').classList.add('hidden');
    }

    function showCallUI(phone, nick) {
        window.incomingCaller = phone;
        document.getElementById('call-label').innerText = "INCOMING CALL";
        document.getElementById('call-target-nick').innerText = nick;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('accept-btn').classList.remove('hidden');
        ringtone.play();
    }

    function respondCall(accepted) {
        ringtone.pause();
        const p = {type: 'call_response', target: window.incomingCaller || curFriendPhone, accept: accepted};
        ws.send(JSON.stringify(p));
        if (accepted) beginVoiceStreaming();
        else endCallUI();
    }

    async function beginVoiceStreaming() {
        document.getElementById('call-label').innerText = "LIVE SESSION (3:00)";
        document.getElementById('accept-btn').classList.add('hidden');
        
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        const recorder = new MediaRecorder(stream);
        
        // --- 1 SECOND CHUNK LOGIC ---
        recorder.ondataavailable = e => {
            if (e.data.size > 0 && ws.readyState === 1) {
                ws.send(e.data); // Sending raw binary to RAM
            }
        };
        recorder.start(1000); // 1-second interval

        // --- TRANSCRIPTION ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.continuous = true; rec.interimResults = true;
            rec.onresult = ev => {
                const txt = ev.results[ev.results.length-1][0].transcript;
                ws.send(JSON.stringify({type:'transcription', target: window.incomingCaller || curFriendPhone, text: txt}));
            };
            rec.start();
        }
    }

    function handleBinaryAudio(buffer) {
        const blob = new Blob([buffer], { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const a = new Audio(url);
        a.play();
    }

    // --- HELPERS ---
    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            if (ws.readyState === 1) {
                ws.send(JSON.stringify({type:'location', lat:pos.coords.latitude, lng:pos.coords.longitude}));
            }
        }, null, {enableHighAccuracy: true});
    }

    function showToast(title, msg, phone) {
        const center = document.getElementById('notification-center');
        const div = document.createElement('div');
        div.className = 'snap-toast';
        div.innerHTML = `<strong>${title}</strong><br>${msg}`;
        div.onclick = () => { if(phone) openChat(phone, title); div.remove(); };
        center.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    function addFriend() {
        const v = document.getElementById('friend-input').value;
        if (!v) return;
        const list = JSON.parse(localStorage.getItem('tracker_v5_friends') || "[]");
        if (!list.includes(v)) { list.push(v); localStorage.setItem('tracker_v5_friends', JSON.stringify(list)); }
        ws.send(JSON.stringify({type:'add_friend', target: v}));
        document.getElementById('friend-input').value = "";
    }

    function setReply(id) { activeReplyId = id; document.getElementById('reply-box').classList.remove('hidden'); }
    function cancelReply() { activeReplyId = null; document.getElementById('reply-box').classList.add('hidden'); }
    function endCallUI() { document.getElementById('call-ui').style.display = 'none'; }
    function sendQuickAlert() { ws.send(JSON.stringify({type:'alert', target: curFriendPhone})); }
</script>
</body>
</html>
